name: Dataset Standards Validation

on:
  push:
    branches: [ "main" ]
  pull_request_target: 
    branches: [ "main" ]
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read

    steps:
      - name: Checkout trusted scripts
        uses: actions/checkout@v6
        with:
          path: base-repo

      - name: Checkout untrusted PR datasets
        if: github.event_name == 'pull_request_target'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr-repo

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Run validation & Comment (PR Check)
        if: github.event_name == 'pull_request_target'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          chmod +x base-repo/.github/scripts/validate_datasets.py
          
          # Step into pr-repo so output paths look clean
          cd pr-repo
          OUTPUT=$(../base-repo/.github/scripts/validate_datasets.py --dir datasets --format json || true)
          cd ..
          
          export RESULTS="$OUTPUT"
          
          # Run the TRUSTED sync script
          python base-repo/.github/scripts/sync_issues.py --mode pr

      - name: Run validation (Issue Sync)
        id: run_validation
        if: github.event_name != 'pull_request_target'
        run: |
          chmod +x base-repo/.github/scripts/validate_datasets.py
          
          # Step into base-repo so output paths look clean
          cd base-repo
          OUTPUT=$(.github/scripts/validate_datasets.py --dir datasets --format json || true)
          cd ..
          
          # $GITHUB_OUTPUT is an absolute path, so appending to it here is safe
          echo "results=$OUTPUT" >> $GITHUB_OUTPUT

      - name: Sync GitHub Issues
        if: github.event_name != 'pull_request_target'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RESULTS: ${{ steps.run_validation.outputs.results }}
        run: |
          python base-repo/.github/scripts/sync_issues.py --mode issues