name: Dataset Standards Validation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Run validation (PR Check)
        if: github.event_name == 'pull_request'
        run: |
          chmod +x .github/scripts/validate_datasets.py
          .github/scripts/validate_datasets.py --format text

      - name: Run validation (Issue Sync)
        id: run_validation
        if: github.event_name != 'pull_request'
        run: |
          chmod +x .github/scripts/validate_datasets.py
          OUTPUT=$(.github/scripts/validate_datasets.py --format json || true)
          echo "results=$OUTPUT" >> $GITHUB_OUTPUT

      - name: Sync GitHub Issues
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          RESULTS: ${{ steps.run_validation.outputs.results }}
        run: |
          # 1. Process Violations (Create or Update Issues where array length > 0)
          echo "$RESULTS" | jq -c '.violations | to_entries[] | select(.value | length > 0)' | while read -r entry; do
            DS_NAME=$(echo "$entry" | jq -r '.key')
            FORMATTED_LIST=$(echo "$entry" | jq -r '.value[] | "- **\(.name)**\n  > \(.help)\n"')
            TITLE="[Dataset Standard Violation] $DS_NAME"
            
            # Use standard multi-line double quotes instead of heredoc to avoid indentation errors
            BODY="### ⚠️ Standard Violations Found in \`datasets/$DS_NAME\`
            
            The following required components are missing or invalid:
            
            $FORMATTED_LIST
            
            _This issue was automatically generated by the Dataset Validator Action._"

            ISSUE_NUMBER=$(gh issue list --search "$TITLE" --state open --json number --jq '.[0].number')

            if [ -n "$ISSUE_NUMBER" ]; then
              gh issue edit "$ISSUE_NUMBER" --body "$BODY"
            else
              gh issue create --title "$TITLE" --body "$BODY" --label "bug,data-standard"
            fi
          done

          # 2. Process Fixed Datasets (Close Resolved Issues where array length == 0)
          echo "$RESULTS" | jq -c '.violations | to_entries[] | select(.value | length == 0)' | while read -r entry; do
            DS_NAME=$(echo "$entry" | jq -r '.key')
            TITLE="[Dataset Standard Violation] $DS_NAME"
            ISSUE_NUMBER=$(gh issue list --search "$TITLE" --state open --json number --jq '.[0].number')
            
            if [ -n "$ISSUE_NUMBER" ]; then
              gh issue close "$ISSUE_NUMBER" --comment "✅ All required standard files and directories are now present. Closing issue."
            fi
          done